<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер статистики игроков</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1512;
    --card: #16211b;
    --card-line: #223026;
    --row-line: #1c2921;
    --turf: #7CE38B;
    --amber: #F2B544;
    --red: #E2554B;
    --blue: #6FA8D6;
    --grey: #9CA8A1;
    --text: #EAF2EC;
    --muted: #8AA095;
    --muted-2: #5d7267;
    --input-bg: #101a15;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 14px;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #131f18 0%, var(--bg) 55%);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 980px; }

  .card {
    background: var(--card);
    border: 1px solid var(--card-line);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    margin-bottom: 18px;
  }

  .header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--card-line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--turf);
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin: 4px 0 0;
    text-transform: uppercase;
  }
  #saveIndicator {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--turf);
    opacity: 0;
    transition: opacity .4s ease;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* PLAYER BAR */
  .player-bar {
    padding: 16px 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--card-line);
    background: #131c17;
  }
  .player-bar input[type="text"] {
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .player-bar input[type="text"]:focus { border-color: var(--turf); }
  #playerInput { flex: 1; min-width: 160px; }
  .btn {
    background: var(--turf);
    color: #0e1512;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn.danger { background: var(--red); color: #fff; }

  .player-chips {
    padding: 12px 22px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    font-size: 12.5px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .chip.active {
    background: rgba(124,227,139,0.12);
    border-color: var(--turf);
    color: var(--turf);
    font-weight: 600;
  }

  .current-player {
    padding: 14px 22px 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text);
  }
  .current-player span { color: var(--muted); font-size: 13px; font-weight: 500; text-transform: none; margin-left: 8px; }

  /* SUMMARY (read-only) */
  .summary {
    margin: 16px 22px 0;
    padding: 16px 16px 14px;
    background: #131c17;
    border: 1px solid var(--card-line);
    border-radius: 14px;
  }
  .summary-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .summary-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .summary-filters select {
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    outline: none;
    cursor: pointer;
  }
  .summary-filters select:focus { border-color: var(--turf); }

  .summary-rings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .ring-block { display: flex; align-items: center; gap: 10px; }
  .ring-wrap { position: relative; width: 58px; height: 58px; flex: none; }
  .ring-wrap svg { transform: rotate(-90deg); width: 58px; height: 58px; }
  .ring-track { fill: none; stroke: #223026; stroke-width: 6; }
  .ring-value { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1); }
  .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }
  .ring-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.1;
  }
  .ring-stat .num span { color: var(--muted); font-weight: 500; font-size: 13px; }
  .ring-stat .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 2px;
  }

  .summary-missed { padding-top: 12px; border-top: 1px solid var(--card-line); }

  .summary-goals {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary-goals .stat {
    flex: 1;
    text-align: center;
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    border-radius: 10px;
    padding: 10px 6px;
  }
  .summary-goals .stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 24px;
    line-height: 1;
  }
  .summary-goals .stat.goals .num { color: var(--turf); }
  .summary-goals .stat.assists .num { color: var(--blue); }
  .summary-goals .stat.seasons .num { color: var(--amber); }
  .summary-goals .stat .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 3px;
  }

  .pdf-btn {
    background: transparent;
    border: 1px solid var(--card-line);
    color: var(--muted);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .pdf-btn:hover { border-color: var(--turf); color: var(--turf); }

  @media print {
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --card-line: #d5d9d6;
      --row-line: #e5e8e6;
      --text: #111111;
      --muted: #444444;
      --muted-2: #666666;
      --input-bg: #f4f6f5;
    }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    body { padding: 0; background: #fff; }
    .card { box-shadow: none; border: none; }
    .no-print { display: none !important; }
    .summary { margin: 0; }
  }
  .missed-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .missed-head .title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .missed-head .count { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--red); font-size: 14px; }
  .missed-bar {
    display: flex;
    height: 7px;
    border-radius: 6px;
    overflow: hidden;
    background: #223026;
  }
  .missed-bar span { height: 100%; transition: width .6s ease; }
  .missed-legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--muted);
  }
  .missed-legend .item { display: flex; align-items: center; gap: 4px; }
  .missed-legend .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* CLUB vs NATIONAL SPLIT */
  .split-stats {
    padding-top: 12px;
    margin-top: 12px;
    border-top: 1px solid var(--card-line);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .split-col {
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .split-col .split-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .split-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: var(--muted);
    padding: 3px 0;
  }
  .split-row .v {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }
  .split-row .v.goals { color: var(--turf); }
  .split-row .v.assists { color: var(--blue); }
  .split-row .v.yellow { color: var(--amber); }
  .split-row .v.red { color: var(--red); }

  /* TABLE */
  .table-scroll { overflow-x: auto; padding: 12px 22px 22px; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; table-layout: fixed; }
  thead th {
    font-size: 13px;
    text-align: center;
    color: var(--muted);
    padding: 5px 1px;
    border-bottom: 1px solid var(--card-line);
    white-space: nowrap;
    cursor: default;
  }
  thead th.text-col { text-align: left; padding-left: 4px; }
  tbody td {
    padding: 3px 2px;
    border-bottom: 1px solid var(--row-line);
  }
  tbody tr:hover { background: rgba(255,255,255,0.015); }

  td input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    color: var(--text);
    border-radius: 5px;
    padding: 5px 6px;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    outline: none;
  }
  td input:focus { border-color: var(--turf); }
  td input.num {
    text-align: center;
    font-family: 'Space Mono', monospace;
    width: 34px;
    padding: 5px 2px;
    margin: 0 auto;
    display: block;
  }
  td.num-cell { text-align: center; padding-left: 1px; padding-right: 1px; }
  td.num-cell input.num { width: 30px; padding: 5px 1px; }
  td.text-cell input { min-width: 0; width: 100%; }
  td.col-season select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    color: var(--text);
    border-radius: 5px;
    padding: 5px 2px;
    font-size: 12px;
    text-align: center;
    outline: none;
    font-family: 'Space Mono', monospace;
  }
  td.col-season select:focus { border-color: var(--turf); }
  td.col-type select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--card-line);
    color: var(--text);
    border-radius: 5px;
    padding: 5px 2px;
    font-size: 13px;
    text-align: center;
    outline: none;
  }
  td.col-type select:focus { border-color: var(--turf); }

  .col-goals input { color: var(--turf); }
  .col-assists input { color: var(--blue); }
  .col-yellow input { color: var(--amber); }
  .col-red input { color: var(--red); }
  .col-total input { color: var(--muted); }
  .col-rotation input { color: var(--muted-2); }
  .col-injury input { color: var(--amber); }
  .col-outsquad input { color: var(--grey); }
  .col-susp input { color: var(--red); }

  .row-del {
    background: none;
    border: none;
    color: var(--muted-2);
    cursor: pointer;
    font-size: 15px;
    padding: 3px 6px;
  }
  .row-del:hover { color: var(--red); }

  .add-row-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px dashed var(--card-line);
    color: var(--muted);
    border-radius: 8px;
    padding: 9px;
    width: 100%;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
  }
  .add-row-btn:hover { border-color: var(--turf); color: var(--turf); }

  tfoot td {
    padding: 8px 2px;
    border-top: 2px solid var(--card-line);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-align: center;
  }
  tfoot .tot-label { color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; text-align: left; padding-left: 4px; }
  tfoot .col-goals { color: var(--turf); }
  tfoot .col-assists { color: var(--blue); }
  tfoot .col-yellow { color: var(--amber); }
  tfoot .col-red { color: var(--red); }
  tfoot .col-total { color: var(--muted); }
  tfoot .col-rotation { color: var(--muted-2); }
  tfoot .col-injury { color: var(--amber); }
  tfoot .col-outsquad { color: var(--grey); }
  tfoot .col-susp { color: var(--red); }

  .empty-state {
    padding: 40px 22px;
    text-align: center;
    color: var(--muted-2);
    font-size: 13.5px;
  }

  .footer-note {
    padding: 12px 22px 18px;
    font-size: 11px;
    color: var(--muted-2);
    border-top: 1px solid var(--card-line);
    text-align: center;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="header no-print">
      <div>
        <div class="eyebrow">Трекер статистики</div>
        <h1>Игроки и сезоны</h1>
      </div>
      <div id="saveIndicator">✓ Сохранено локально</div>
    </div>

    <div class="player-bar no-print">
      <input type="text" id="playerInput" placeholder="Имя игрока (например, Лионель Месси)" list="playerNames">
      <datalist id="playerNames"></datalist>
      <button class="btn" onclick="addOrSelectPlayer()">Добавить / открыть</button>
      <button class="btn danger" id="deletePlayerBtn" style="display:none" onclick="deleteCurrentPlayer()">Удалить игрока</button>
    </div>

    <div class="player-chips no-print" id="playerChips"></div>

    <div id="mainContent"></div>

    <div class="footer-note no-print">Все данные сохраняются локально в этом браузере (localStorage) — ничего не отправляется на сервер</div>
  </div>
</div>

<datalist id="clubsList"></datalist>
<datalist id="tournamentsList"></datalist>

<script>
const STORAGE_KEY = 'playerStatsTracker_v3';
let db = {};
let currentPlayer = null;
let filterSeason = 'all';
let filterTournament = 'all';
let filterClub = 'all';

function load() {
  try { db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { db = {}; }
}

let saveFlashTimer = null;
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    flashSaved();
  } catch(e) {
    console.error('Storage error', e);
  }
}
function flashSaved() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(saveFlashTimer);
  saveFlashTimer = setTimeout(() => { el.style.opacity = '0'; }, 1000);
}

function emptyRow() {
  return {
    season: '', tournament: '', clubs: '', type: 'club',
    matchesPlayed: '', matchesTotal: '',
    missRotation: '', missInjury: '', missOutOfSquad: '', missSuspension: '',
    goals: '', assists: '', yellow: '', red: '',
    minutesPlayed: '', minutesTotal: ''
  };
}

function escapeAttr(str) { return String(str).replace(/"/g, '&quot;'); }
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPlayerChips() {
  const wrap = document.getElementById('playerChips');
  const names = Object.keys(db);
  wrap.innerHTML = '';
  names.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (name === currentPlayer ? ' active' : '');
    chip.textContent = name;
    chip.onclick = () => selectPlayer(name);
    wrap.appendChild(chip);
  });
  const datalist = document.getElementById('playerNames');
  datalist.innerHTML = names.map(n => `<option value="${escapeAttr(n)}">`).join('');
}

function refreshClubsList() {
  const clubsList = document.getElementById('clubsList');
  const set = new Set();
  Object.values(db).forEach(p => {
    (p.rows || []).forEach(r => {
      String(r.clubs || '')
        .split(/[,/;]/)
        .map(s => s.trim())
        .filter(Boolean)
        .forEach(c => set.add(c));
    });
  });
  clubsList.innerHTML = [...set].map(c => `<option value="${escapeAttr(c)}">`).join('');
}

function refreshTournamentsList() {
  const tournamentsList = document.getElementById('tournamentsList');
  const tournamentSet = new Set();
  Object.values(db).forEach(p => {
    (p.rows || []).forEach(r => {
      if (r.tournament) tournamentSet.add(r.tournament.trim());
    });
  });
  tournamentsList.innerHTML = [...tournamentSet].filter(Boolean).map(t => `<option value="${escapeAttr(t)}">`).join('');
}

function buildSeasonOptions(selected) {
  let html = `<option value="">—</option>`;
  for (let y = 0; y <= 29; y++) {
    const a = String(y).padStart(2, '0');
    const b = String((y + 1) % 100).padStart(2, '0');
    const val = `${a}/${b}`;
    html += `<option value="${val}" ${selected === val ? 'selected' : ''}>${val}</option>`;
  }
  return html;
}

function addOrSelectPlayer() {
  const input = document.getElementById('playerInput');
  const name = input.value.trim();
  if (!name) return;
  if (!db[name]) {
    db[name] = { rows: [ emptyRow() ] };
    save();
  }
  input.value = '';
  selectPlayer(name);
}

function selectPlayer(name) {
  currentPlayer = name;
  filterSeason = 'all';
  filterTournament = 'all';
  filterClub = 'all';
  renderPlayerChips();
  document.getElementById('deletePlayerBtn').style.display = 'inline-block';
  renderTable();
}

function deleteCurrentPlayer() {
  if (!currentPlayer) return;
  if (!confirm('Удалить игрока "' + currentPlayer + '" и все его данные?')) return;
  delete db[currentPlayer];
  save();
  currentPlayer = null;
  document.getElementById('deletePlayerBtn').style.display = 'none';
  renderPlayerChips();
  renderTable();
}

function updateRow(idx, field, value) {
  db[currentPlayer].rows[idx][field] = value;
  save();
  refreshDerived();
}

function addRow() {
  db[currentPlayer].rows.push(emptyRow());
  save();
  renderTable();
}

function deleteRow(idx) {
  db[currentPlayer].rows.splice(idx, 1);
  if (db[currentPlayer].rows.length === 0) db[currentPlayer].rows.push(emptyRow());
  save();
  renderTable();
}

function setFilter(kind, value) {
  if (kind === 'season') filterSeason = value;
  if (kind === 'tournament') filterTournament = value;
  if (kind === 'club') filterClub = value;
  renderTable();
}

function sumField(rows, field) {
  return rows.reduce((acc, r) => acc + (parseInt(r[field]) || 0), 0);
}

function rowsOfType(rows, type) {
  return rows.filter(r => (r.type || 'club') === type);
}

function clubTokens(clubsStr) {
  return String(clubsStr || '').split(/[,/;]/).map(s => s.trim()).filter(Boolean);
}

function rowMatchesClub(r, club) {
  if (club === 'all') return true;
  return clubTokens(r.clubs).includes(club);
}

function categoryStats(rows, type) {
  const rs = rowsOfType(rows, type);
  return {
    matchesPlayed: sumField(rs, 'matchesPlayed'),
    matchesTotal: sumField(rs, 'matchesTotal'),
    goals: sumField(rs, 'goals'),
    assists: sumField(rs, 'assists'),
    yellow: sumField(rs, 'yellow'),
    red: sumField(rs, 'red'),
    minutesPlayed: sumField(rs, 'minutesPlayed'),
    minutesTotal: sumField(rs, 'minutesTotal')
  };
}

function ringSetup(id, pct) {
  const el = document.getElementById(id);
  if (!el) return;
  const r = 24;
  const circumference = 2 * Math.PI * r;
  el.style.strokeDasharray = circumference;
  const offset = circumference - (Math.min(Math.max(pct,0),100) / 100) * circumference;
  requestAnimationFrame(() => { el.style.strokeDashoffset = offset; });
}

function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function setHtml(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val; }
function setStyle(id, prop, val) { const el = document.getElementById(id); if (el) el.style[prop] = val; }

function refreshDerived() {
  if (!currentPlayer) return;
  const allRows = db[currentPlayer].rows;

  const seasons = [...new Set(allRows.map(r => r.season).filter(Boolean))];
  const tournaments = [...new Set(allRows.map(r => r.tournament).filter(Boolean))];
  const clubs = [...new Set(allRows.flatMap(r => clubTokens(r.clubs)))];
  const seasonSelect = document.getElementById('seasonSelect');
  const tournamentSelect = document.getElementById('tournamentSelect');
  const clubSelect = document.getElementById('clubSelect');
  if (seasonSelect) {
    seasonSelect.innerHTML = `<option value="all">Все сезоны</option>` +
      seasons.map(s => `<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`).join('');
    if (!seasons.includes(filterSeason)) filterSeason = 'all';
    seasonSelect.value = filterSeason;
  }
  if (tournamentSelect) {
    tournamentSelect.innerHTML = `<option value="all">Все турниры</option>` +
      tournaments.map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join('');
    if (!tournaments.includes(filterTournament)) filterTournament = 'all';
    tournamentSelect.value = filterTournament;
  }
  if (clubSelect) {
    clubSelect.innerHTML = `<option value="all">Все клубы</option>` +
      clubs.map(c => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`).join('');
    if (!clubs.includes(filterClub)) filterClub = 'all';
    clubSelect.value = filterClub;
  }

  const filteredRows = allRows.filter(r =>
    (filterSeason === 'all' || r.season === filterSeason) &&
    (filterTournament === 'all' || r.tournament === filterTournament) &&
    rowMatchesClub(r, filterClub)
  );

  const matchesPlayed = sumField(filteredRows, 'matchesPlayed');
  const matchesTotal = sumField(filteredRows, 'matchesTotal');
  const matchesPct = matchesTotal > 0 ? Math.round((matchesPlayed / matchesTotal) * 100) : 0;

  const minutesPlayed = sumField(filteredRows, 'minutesPlayed');
  const minutesTotal = sumField(filteredRows, 'minutesTotal');
  const minutesPct = minutesTotal > 0 ? Math.round((minutesPlayed / minutesTotal) * 100) : 0;

  const rotation = sumField(filteredRows, 'missRotation');
  const injury = sumField(filteredRows, 'missInjury');
  const outOfSquad = sumField(filteredRows, 'missOutOfSquad');
  const suspension = sumField(filteredRows, 'missSuspension');
  const namedMissed = rotation + injury + outOfSquad + suspension;
  const barTotal = Math.max(matchesTotal, matchesPlayed + namedMissed);
  const missedTotal = Math.max(matchesTotal - matchesPlayed, namedMissed);

  setText('matchesPctText', matchesPct + '%');
  setHtml('matchesStatText', `${matchesPlayed}<span>/${matchesTotal}</span>`);
  setText('minutesPctText', minutesPct + '%');
  setHtml('minutesStatText', `${minutesPlayed}<span>/${minutesTotal}</span>`);
  setText('missedCountText', missedTotal);
  setText('sumSeasonsText', new Set(filteredRows.map(r=>r.season).filter(Boolean)).size);
  setText('sumGoalsText', sumField(filteredRows,'goals'));
  setText('sumAssistsText', sumField(filteredRows,'assists'));
  ringSetup('ringMatches', matchesPct);
  ringSetup('ringMinutes', minutesPct);

  const pct = (v) => barTotal > 0 ? (v / barTotal * 100) + '%' : '0%';
  setStyle('segPlayed', 'width', pct(matchesPlayed));
  setStyle('segRotation', 'width', pct(rotation));
  setStyle('segInjury', 'width', pct(injury));
  setStyle('segOutSquad', 'width', pct(outOfSquad));
  setStyle('segSuspension', 'width', pct(suspension));

  setText('legendRotation', rotation);
  setText('legendInjury', injury);
  setText('legendOutSquad', outOfSquad);
  setText('legendSuspension', suspension);

  setText('footMatchesPlayed', sumField(allRows,'matchesPlayed'));
  setText('footMatchesTotal', sumField(allRows,'matchesTotal'));
  setText('footRotation', sumField(allRows,'missRotation'));
  setText('footInjury', sumField(allRows,'missInjury'));
  setText('footOutSquad', sumField(allRows,'missOutOfSquad'));
  setText('footSuspension', sumField(allRows,'missSuspension'));
  setText('footGoals', sumField(allRows,'goals'));
  setText('footAssists', sumField(allRows,'assists'));
  setText('footYellow', sumField(allRows,'yellow'));
  setText('footRed', sumField(allRows,'red'));
  setText('footMinutesPlayed', sumField(allRows,'minutesPlayed'));
  setText('footMinutesTotal', sumField(allRows,'minutesTotal'));

  const clubStats = categoryStats(filteredRows, 'club');
  const natStats = categoryStats(filteredRows, 'national');
  setText('clubMatches', `${clubStats.matchesPlayed}/${clubStats.matchesTotal}`);
  setText('clubGoals', clubStats.goals);
  setText('clubAssists', clubStats.assists);
  setText('clubCards', `${clubStats.yellow} / ${clubStats.red}`);
  setText('clubMinutes', `${clubStats.minutesPlayed}/${clubStats.minutesTotal}`);
  setText('natMatches', `${natStats.matchesPlayed}/${natStats.matchesTotal}`);
  setText('natGoals', natStats.goals);
  setText('natAssists', natStats.assists);
  setText('natCards', `${natStats.yellow} / ${natStats.red}`);
  setText('natMinutes', `${natStats.minutesPlayed}/${natStats.minutesTotal}`);
}
